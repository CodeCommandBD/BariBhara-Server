name: 🚀 Server CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ===========================
  # JOB 1: TypeScript Build Check
  # ===========================
  build-check:
    name: 🔷 TypeScript Build Check
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔷 TypeScript Compile Check
        run: npm run build

      - name: ✅ Build Artifact Check
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build successful! dist/ folder exists."
            ls -la dist/
          else
            echo "❌ Build failed! dist/ folder not found."
            exit 1
          fi

  # ===========================
  # JOB 2: Environment & Security Audit
  # ===========================
  security-audit:
    name: 🔐 Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🔐 npm Security Audit
        run: npm audit --audit-level=high
        continue-on-error: true   # audit warning হলেও pipeline থামবে না

      - name: 🔍 Check for .env files in code
        run: |
          if grep -r "MONGODB_URI\|JWT_SECRET\|API_KEY" --include="*.ts" --include="*.js" src/ controller/ models/ routes/ 2>/dev/null | grep -v "process.env"; then
            echo "⚠️ Warning: Possible hardcoded secrets found!"
          else
            echo "✅ No hardcoded secrets found."
          fi

  # ===========================
  # JOB 3: Deploy to Render (শুধু main branch)
  # ===========================
  deploy:
    name: 🌐 Deploy to Render
    runs-on: ubuntu-latest
    needs: [build-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 🚀 Trigger Render Deploy Hook
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy triggered:', d.get('id','unknown'))"

      - name: ⏳ Wait for Deployment (90s)
        run: sleep 90

      - name: 🔍 Health Check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.SERVER_HEALTH_URL }}/")
          echo "Server response: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Server is healthy!"
          else
            echo "❌ Server health check failed with status: $STATUS"
            exit 1
          fi
